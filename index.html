<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 APIPulse - API测试工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Fira Code', monospace; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        
        header { background: #161b22; padding: 15px 30px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        header h1 { background: linear-gradient(135deg, #58a6ff, #238636); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.5rem; }
        
        .container { display: flex; height: calc(100vh - 60px); }
        
        .sidebar { width: 220px; background: #161b22; border-right: 1px solid #30363d; padding: 15px 0; overflow-y: auto; }
        .sidebar h3 { padding: 10px 20px; color: #8b949e; font-size: 0.8rem; text-transform: uppercase; }
        .history-item { padding: 10px 20px; cursor: pointer; border-left: 2px solid transparent; transition: all 0.2s; }
        .history-item:hover { background: #21262d; }
        .history-item.active { background: #21262d; border-left-color: #58a6ff; }
        .method { font-weight: bold; font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; margin-right: 8px; }
        .GET { background: #238636; color: white; }
        .POST { background: #58a6ff; color: white; }
        .PUT { background: #d29922; color: white; }
        .DELETE { background: #da3633; color: white; }
        .url { font-size: 0.85rem; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .main { flex: 1; display: flex; flex-direction: column; }
        .request-bar { background: #161b22; padding: 15px 20px; border-bottom: 1px solid #30363d; display: flex; gap: 10px; }
        .method-select { background: #21262d; border: 1px solid #30363d; padding: 10px 15px; border-radius: 6px; color: #c9d1d9; font-weight: bold; }
        .url-input { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 10px 15px; border-radius: 6px; color: #c9d1d9; font-family: monospace; }
        .url-input:focus { outline: none; border-color: #58a6ff; }
        .send-btn { background: #238636; border: none; padding: 10px 25px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
        .send-btn:hover { background: #2ea043; }
        
        .tabs { background: #161b22; display: flex; border-bottom: 1px solid #30363d; }
        .tab { padding: 12px 20px; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; }
        .tab:hover { color: #c9d1d9; }
        .tab.active { color: #c9d1d9; border-bottom-color: #58a6ff; }
        
        .content { flex: 1; display: flex; overflow: hidden; }
        .input-area, .output-area { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #30363d; }
        .panel-header { background: #161b22; padding: 10px 20px; font-size: 0.85rem; color: #8b949e; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; }
        textarea { flex: 1; background: #0d1117; border: none; padding: 15px; color: #c9d1d9; font-family: 'Fira Code', monospace; font-size: 13px; line-height: 1.6; resize: none; }
        textarea:focus { outline: none; }
        
        .response-meta { padding: 15px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; gap: 20px; font-size: 0.9rem; }
        .status { font-weight: bold; }
        .success { color: #238636; }
        .error { color: #da3633; }
        .time { color: #8b949e; }
        
        .empty { padding: 60px; text-align: center; color: #8b949e; }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        
        .tab-panel { display: none; padding: 15px; background: #161b22; border-bottom: 1px solid #30363d; }
        .tab-panel.show { display: block; }
        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        .row input { flex: 1; background: #21262d; border: 1px solid #30363d; padding: 8px 12px; border-radius: 6px; color: #c9d1d9; }
        .row input:focus { outline: none; border-color: #58a6ff; }
        .remove-btn { background: #da3633; border: none; padding: 8px 12px; border-radius: 6px; color: white; cursor: pointer; }
        .add-btn { background: #21262d; border: 1px solid #30363d; padding: 8px 15px; border-radius: 6px; color: #8b949e; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>🚀 APIPulse</h1>
        <span style="color:#8b949e">API Testing Tool</span>
    </header>
    
    <div class="container">
        <div class="sidebar">
            <h3>📜 历史记录</h3>
            <div id="historyList"></div>
        </div>
        
        <div class="main">
            <div class="request-bar">
                <select class="method-select" id="method">
                    <option value="GET">GET</option>
                    <option value="POST">POST</option>
                    <option value="PUT">PUT</option>
                    <option value="DELETE">DELETE</option>
                    <option value="PATCH">PATCH</option>
                </select>
                <input type="text" class="url-input" id="url" placeholder="输入API URL">
                <button class="send-btn" onclick="sendRequest()">发送</button>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="switchTab('body', this)">Body</div>
                <div class="tab" onclick="switchTab('headers', this)">Headers</div>
                <div class="tab" onclick="switchTab('params', this)">Params</div>
            </div>
            
            <div id="tab-body" class="tab-panel show">
                <div class="content">
                    <div class="input-area">
                        <div class="panel-header"><span>请求体</span><button onclick="formatInput()" style="background:none;border:none;color:#58a6ff;cursor:pointer">✨ 格式化</button></div>
                        <textarea id="requestBody" placeholder='{"key": "value"}'></textarea>
                    </div>
                    <div class="output-area">
                        <div class="panel-header"><span>响应</span><button onclick="copyResponse()" style="background:none;border:none;color:#58a6ff;cursor:pointer">📋 复制</button></div>
                        <div id="responseArea" class="empty"><div class="icon">📡</div><p>发送请求查看响应</p></div>
                    </div>
                </div>
            </div>
            
            <div id="tab-headers" class="tab-panel">
                <div id="headersList">
                    <div class="row"><input type="text" placeholder="Header名称" value="Content-Type"><input type="text" placeholder="值" value="application/json"><button class="remove-btn" onclick="this.parentElement.remove()">×</button></div>
                </div>
                <button class="add-btn" onclick="addHeader()">+ 添加Header</button>
            </div>
            
            <div id="tab-params" class="tab-panel">
                <div id="paramsList">
                    <div class="row"><input type="text" placeholder="参数名"><input type="text" placeholder="值"><button class="remove-btn" onclick="this.parentElement.remove()">×</button></div>
                </div>
                <button class="add-btn" onclick="addParam()">+ 添加参数</button>
            </div>
        </div>
    </div>
    
    <script>
        let history = JSON.parse(localStorage.getItem('apipulse_history') || '[]');
        renderHistory();
        
        function switchTab(tab, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('show'));
            document.getElementById('tab-' + tab).classList.add('show');
        }
        
        function addHeader() {
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = '<input type="text" placeholder="Header名称"><input type="text" placeholder="值"><button class="remove-btn" onclick="this.parentElement.remove()">×</button>';
            document.getElementById('headersList').appendChild(div);
        }
        
        function addParam() {
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = '<input type="text" placeholder="参数名"><input type="text" placeholder="值"><button class="remove-btn" onclick="this.parentElement.remove()">×</button>';
            document.getElementById('paramsList').appendChild(div);
        }
        
        async function sendRequest() {
            const method = document.getElementById('method').value;
            let url = document.getElementById('url').value.trim();
            if (!url) { alert('请输入URL'); return; }
            
            const params = [];
            document.querySelectorAll('#paramsList .row').forEach(row => {
                const key = row.children[0].value.trim();
                const val = row.children[1].value.trim();
                if (key) params.push(encodeURIComponent(key) + '=' + encodeURIComponent(val));
            });
            if (params.length) url += (url.includes('?') ? '&' : '?') + params.join('&');
            
            const headers = {};
            document.querySelectorAll('#headersList .row').forEach(row => {
                const key = row.children[0].value.trim();
                const val = row.children[1].value.trim();
                if (key) headers[key] = val;
            });
            
            const body = document.getElementById('requestBody').value;
            const responseArea = document.getElementById('responseArea');
            responseArea.innerHTML = '<div style="padding:40px;text-align:center">⏳ 发送中...</div>';
            const startTime = Date.now();
            
            try {
                const options = { method, headers };
                if (body && method !== 'GET') options.body = body;
                
                const response = await fetch(url, options);
                const time = Date.now() - startTime;
                const contentType = response.headers.get('content-type') || '';
                
                let data, display;
                if (contentType.includes('application/json')) {
                    data = await response.json();
                    display = JSON.stringify(data, null, 2);
                } else {
                    data = await response.text();
                    display = data;
                }
                
                const statusClass = response.ok ? 'success' : 'error';
                responseArea.innerHTML = '<div class="response-meta"><span class="status ' + statusClass + '">' + response.status + ' ' + response.statusText + '</span><span class="time">' + time + 'ms</span></div><textarea readonly style="flex:1">' + display + '</textarea>';
                
                addToHistory(method, url, data);
            } catch (error) {
                responseArea.innerHTML = '<div class="response-meta"><span class="status error">错误</span></div><div style="padding:20px;color:#da3633">' + error.message + '</div>';
            }
        }
        
        function addToHistory(method, url, response) {
            const item = { method, url, response: typeof response === 'string' ? response.substring(0, 100) : JSON.stringify(response).substring(0, 100), time: new Date().toISOString() };
            history.unshift(item);
            history = history.slice(0, 50);
            localStorage.setItem('apipulse_history', JSON.stringify(history));
            renderHistory();
        }
        
        function renderHistory() {
            const list = document.getElementById('historyList');
            if (history.length === 0) { list.innerHTML = '<div style="padding:20px;color:#8b949e;text-align:center">暂无请求历史</div>'; return; }
            list.innerHTML = history.map((item, i) => '<div class="history-item" onclick="loadHistory(' + i + ')"><span class="method ' + item.method + '">' + item.method + '</span><div class="url">' + item.url + '</div></div>').join('');
        }
        
        function loadHistory(i) {
            const item = history[i];
            document.getElementById('method').value = item.method;
            document.getElementById('url').value = item.url;
        }
        
        function formatInput() {
            const input = document.getElementById('requestBody');
            try { input.value = JSON.stringify(JSON.parse(input.value), null, 2); } catch (e) { alert('无效的JSON'); }
        }
        
        function copyResponse() {
            const textarea = document.querySelector('#responseArea textarea');
            if (textarea) { textarea.select(); document.execCommand('copy'); alert('已复制!'); }
        }
        
        document.getElementById('url').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendRequest(); });
    </script>
</body>
</html>
